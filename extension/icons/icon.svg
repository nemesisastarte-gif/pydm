<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffcc"/>
      <stop offset="100%" style="stop-color:#00b894"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)" stroke="#00d4aa" stroke-width="2"/>
  <!-- Flèche téléchargement -->
  <rect x="58" y="28" width="12" height="52" rx="4" fill="url(#accent)"/>
  <!-- Pointe de flèche -->
  <polygon points="40,75 64,100 88,75" fill="url(#accent)"/>
  <!-- Barre horizontale -->
  <rect x="40" y="28" width="48" height="6" rx="3" fill="url(#accent)"/>
  <!-- Éclair -->
  <polygon points="68,54 58,64 66,64 56,78 74,58 64,58 74,48" fill="#ffffff" opacity="0.9"/>
</svg>
