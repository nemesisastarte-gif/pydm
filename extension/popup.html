<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #00d4aa;
      text-align: center;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
      text-align: center;
    }
    .status.connected { background: #0d3b2e; color: #00d4aa; }
    .status.disconnected { background: #3b0d0d; color: #ff6b6b; }
    button {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-start {
      background: #00d4aa;
      color: #1a1a2e;
    }
    .btn-start:hover { background: #00b894; }
    .btn-stop {
      background: #ff6b6b;
      color: #1a1a2e;
    }
    .btn-stop:hover { background: #ee5a5a; }
    .btn-clipboard {
      background: #4a4a6a;
      color: #e0e0e0;
    }
    .btn-clipboard:hover { background: #5a5a7a; }
    .info {
      font-size: 11px;
      color: #888;
      margin-top: 12px;
      text-align: center;
    }
    hr {
      border: 1px solid #333;
      margin: 12px 0;
    }
    .last-dl {
      font-size: 11px;
      background: #16213e;
      padding: 8px;
      border-radius: 4px;
      max-height: 60px;
      overflow-y: auto;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h2>PyDM Bridge</h2>
  
  <div id="status" class="status disconnected">
    Déconnecté
  </div>
  
  <button id="btn-reconnect" class="btn-start">Reconnecter à PyDM</button>
  <button id="btn-test" class="btn-clipboard">Tester la connexion</button>
  
  <hr>
  
  <div class="info">PyDM doit être lancé avec :</div>
  <div class="info"><code>pydm ws-server</code></div>
  
  <hr>
  
  <div class="info">Dernier téléchargement :</div>
  <div id="last-dl" class="last-dl">Aucun</div>
  
  <script src="popup.js"></script>
</body>
</html>
